<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huacas Boutique & Plaza — Master Plan</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

    .hero { background: #0f172a; color: white; padding: 64px 24px; }
    .hero-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 32px; }
    .badge { background: #0d9488; padding: 4px 16px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: white; display: inline-block; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.75rem); font-weight: 900; margin-top: 16px; line-height: 1.1; }
    .hero h1 span { color: #14b8a6; }
    .hero p { font-size: 1.125rem; opacity: 0.8; margin-top: 16px; max-width: 560px; line-height: 1.7; }
    .roi-box { background: rgba(255,255,255,0.1); padding: 24px 32px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15); text-align: center; min-width: 180px; }
    .roi-box p { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
    .roi-number { font-size: 3.5rem; font-weight: 900; color: #14b8a6; font-family: 'Syne', sans-serif; line-height: 1; margin: 8px 0 4px; }
    .roi-sub { font-size: 11px; opacity: 0.5; font-style: italic; }

    nav { position: sticky; top: 0; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); z-index: 50; }
    .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; overflow-x: auto; }
    .tab-btn { padding: 20px 32px; font-size: 13px; font-weight: 700; border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 4px solid transparent; color: #94a3b8; transition: color 0.2s, border-color 0.2s; font-family: 'Syne', sans-serif; }
    .tab-btn:hover { color: #475569; }
    .tab-btn.active { border-bottom-color: #0d9488; color: #0d9488; }

    main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }
    .section { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
    .zone-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px; border-left: 4px solid #0d9488; }
    .zone-card.dark { border-left-color: #0f172a; }
    .zone-card.amber { border-left-color: #b45309; }
    .zone-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .zone-card p { font-size: 13px; color: #64748b; }
    .chart-box { background: white; padding: 32px; border-radius: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
    .chart-title { text-align: center; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; font-family: 'Syne', sans-serif; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }
    .feature-card { background: white; padding: 32px; border-radius: 16px; border: 1px solid #e2e8f0; transition: border-color 0.2s; }
    .feature-card:hover { border-color: #0d9488; }
    .feature-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .feature-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .feature-card p { font-size: 13px; color: #64748b; line-height: 1.6; }

    .comercial-box { background: #134e4a; color: white; padding: 48px; border-radius: 24px; display: flex; flex-wrap: wrap; gap: 48px; }
    .comercial-left { flex: 1; min-width: 260px; }
    .comercial-right { flex: 1; min-width: 260px; display: flex; align-items: center; }
    .opt-card { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 12px; margin-bottom: 16px; }
    .opt-card span { font-weight: 700; color: #5eead4; font-size: 14px; }
    .opt-card p { font-size: 12px; opacity: 0.7; font-style: italic; margin-top: 2px; }
    .security-box { background: white; padding: 32px; border-radius: 16px; color: #0f172a; width: 100%; }
    .security-box h4 { font-weight: 700; text-align: center; margin-bottom: 16px; font-family: 'Syne', sans-serif; }
    .security-box li { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; margin-bottom: 12px; list-style: none; }
    .income-block { margin-top: 24px; padding-top: 24px; border-top: 1px solid #e2e8f0; text-align: center; }
    .income-block p { font-size: 11px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
    .income-block .amount { font-size: 1.75rem; font-weight: 900; color: #0d9488; font-family: 'Syne', sans-serif; margin-top: 4px; }

    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 32px; }
    @media (max-width: 640px) { .stat-grid { grid-template-columns: 1fr; } }
    .stat-card { padding: 32px; border-radius: 16px; text-align: center; }
    .stat-card p { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
    .stat-card .val { font-size: 1.875rem; font-weight: 900; font-family: 'Syne', sans-serif; margin-top: 8px; }
    .stat-card .note { font-size: 11px; opacity: 0.5; margin-top: 4px; }
    .stat-dark { background: #0f172a; color: white; }
    .stat-teal { background: #0d9488; color: white; }
    .stat-amber { background: #b45309; color: white; }

    footer { max-width: 1100px; margin: 0 auto 100px; padding: 40px 24px 0; border-top: 1px solid #e2e8f0; }
    .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    @media (max-width: 640px) { .footer-grid { grid-template-columns: 1fr; } }
    footer h5 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; font-family: 'Syne', sans-serif; }
    footer li { font-size: 12px; color: #94a3b8; margin-bottom: 4px; list-style: none; }
    .footer-right { text-align: right; font-size: 12px; color: #94a3b8; font-style: italic; }
    .footer-right strong { font-style: normal; color: #64748b; display: block; margin-top: 8px; font-family: 'Syne', sans-serif; }

    .back-btn-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 100; }
    .back-btn-wrap a { background: #0f172a; color: white; padding: 12px 24px; border-radius: 999px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 8px; font-family: 'Syne', sans-serif; font-size: 14px; transition: background 0.2s; }
    .back-btn-wrap a:hover { background: #0d9488; }

    .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 20px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const COLORS = ['#0D9488', '#0F172A', '#B45309', '#64748B'];

    function DonutChart({ data, colors }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      const cx = 160, cy = 160, R = 120, r = 75;
      let angle = -Math.PI / 2;
      const slices = data.map((d, i) => {
        const sweep = (d.value / total) * 2 * Math.PI;
        const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
        const x2 = cx + R * Math.cos(angle + sweep), y2 = cy + R * Math.sin(angle + sweep);
        const ix1 = cx + r * Math.cos(angle), iy1 = cy + r * Math.sin(angle);
        const ix2 = cx + r * Math.cos(angle + sweep), iy2 = cy + r * Math.sin(angle + sweep);
        const large = sweep > Math.PI ? 1 : 0;
        const path = `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${r} ${r} 0 ${large} 0 ${ix1} ${iy1} Z`;
        angle += sweep;
        return { path, color: colors[i], label: d.name, value: d.value };
      });
      return (
        <div>
          <svg viewBox="0 0 320 320" style={{width:'100%', maxWidth:320, display:'block', margin:'0 auto'}}>
            {slices.map((s, i) => (
              <path key={i} d={s.path} fill={s.color} stroke="white" strokeWidth="3" />
            ))}
            <text x={cx} y={cy - 8} textAnchor="middle" style={{fontSize:13, fill:'#64748b', fontFamily:'Inter, sans-serif'}}>Total</text>
            <text x={cx} y={cy + 16} textAnchor="middle" style={{fontSize:20, fill:'#0f172a', fontWeight:700, fontFamily:'Syne, sans-serif'}}>1,000m²</text>
          </svg>
          <div className="legend">
            {slices.map((s, i) => (
              <div key={i} className="legend-item">
                <div className="legend-dot" style={{background: s.color}}></div>
                <span>{s.label} ({s.value}%)</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function BarChartSVG({ data }) {
      const W = 560, H = 300, padL = 64, padB = 50, padT = 24, padR = 20;
      const chartW = W - padL - padR;
      const chartH = H - padB - padT;
      const maxVal = 40;
      const groupW = chartW / data.length;
      const barW = groupW * 0.28;
      const gap = groupW * 0.06;
      const yTicks = [0, 10, 20, 30, 40];
      const colors = ['#0d9488', '#b45309'];
      const keys = [
        { key: 'ingreso', label: 'Ingreso Anual Bruto' },
        { key: 'neto',    label: 'Utilidad Neta Anual' },
      ];
      return (
        <div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', display:'block'}}>
            {yTicks.map(t => {
              const y = padT + chartH - (t / maxVal) * chartH;
              return (
                <g key={t}>
                  <line x1={padL} x2={W - padR} y1={y} y2={y} stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4 3"/>
                  <text x={padL - 6} y={y + 4} textAnchor="end" style={{fontSize:11, fill:'#94a3b8', fontFamily:'Inter, sans-serif'}}>₡{t}M</text>
                </g>
              );
            })}
            {data.map((d, gi) => {
              const gx = padL + gi * groupW + groupW * 0.1;
              return keys.map((k, bi) => {
                const val = d[k.key];
                const bh = (val / maxVal) * chartH;
                const x = gx + bi * (barW + gap);
                const y = padT + chartH - bh;
                return (
                  <g key={k.key}>
                    <rect x={x} y={y} width={barW} height={bh} fill={colors[bi]} rx="4"/>
                    <text x={x + barW/2} y={y - 5} textAnchor="middle" style={{fontSize:10, fill:'#475569', fontFamily:'Inter, sans-serif', fontWeight:600}}>₡{val}M</text>
                  </g>
                );
              });
            })}
            {data.map((d, gi) => {
              const gx = padL + gi * groupW + groupW / 2;
              return <text key={d.name} x={gx} y={H - 10} textAnchor="middle" style={{fontSize:12, fill:'#475569', fontFamily:'Syne, sans-serif', fontWeight:700}}>{d.name}</text>;
            })}
          </svg>
          <div className="legend">
            {keys.map((k, i) => (
              <div key={k.key} className="legend-item">
                <div className="legend-dot" style={{background: colors[i]}}></div>
                <span>{k.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    const dataComparativa = [
      { name: 'Solo Airbnb', ingreso: 22.7, neto: 10.4 },
      { name: 'Uso Mixto',   ingreso: 34.5, neto: 19.3 },
    ];
    const distributionData = [
      { name: 'Airbnb (Residencial)', value: 50 },
      { name: 'Locales Comerciales',  value: 20 },
      { name: 'Zonas Verdes',         value: 20 },
      { name: 'Parqueos / Accesos',   value: 10 },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('vision');
      const tabs = [
        { id: 'vision',     label: 'Visión 1,000m²' },
        { id: 'bookings',   label: 'Potenciar Bookings' },
        { id: 'comercial',  label: 'Mix Comercial' },
        { id: 'financiero', label: 'Análisis Financiero' },
      ];

      return (
        <>
          <header className="hero">
            <div className="hero-inner">
              <div>
                <span className="badge">Master Plan de Inversión</span>
                <h1>Huacas <span>Boutique & Plaza</span></h1>
                <p>Estrategia de uso mixto en 1,000m²: Maximizando el flujo comercial y la experiencia premium de Airbnb.</p>
              </div>
              <div className="roi-box">
                <p>ROI Proyectado (Optimizado)</p>
                <div className="roi-number">14.5%</div>
                <p className="roi-sub">Flujo Comercial + Airbnb</p>
              </div>
            </div>
          </header>

          <nav>
            <div className="nav-inner">
              {tabs.map(t => (
                <button key={t.id} className={`tab-btn ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
                  {t.label}
                </button>
              ))}
            </div>
          </nav>

          <main>
            {activeTab === 'vision' && (
              <div className="section two-col">
                <div>
                  <h2 style={{fontSize:'1.875rem', fontWeight:800, marginBottom:24}}>Optimización de Terreno</h2>
                  <p style={{color:'#475569', lineHeight:1.8, marginBottom:32, fontSize:'1.05rem'}}>
                    Huacas es el cruce estratégico de Guanacaste. Usar los 1,000m² solo para 2 casas es subutilizar el activo. Nuestra propuesta divide el lote en zonas de alta eficiencia:
                  </p>
                  <div className="zone-card">
                    <h4>Zona A: Frente de Calle (200-250m²)</h4>
                    <p>2-3 Locales comerciales. Ingreso fijo mensual. Actúa como barrera de sonido.</p>
                  </div>
                  <div className="zone-card dark">
                    <h4>Zona B: El Oasis (500m²)</h4>
                    <p>Los 2 apartamentos + Piscina + Rancho. Privacidad total al fondo del lote.</p>
                  </div>
                  <div className="zone-card amber">
                    <h4>Zona C: Expansión (Fase 2)</h4>
                    <p>Espacio reservado para 2 Tiny Homes/A-Frames para aumentar densidad sin grandes obras.</p>
                  </div>
                </div>
                <div className="chart-box">
                  <p className="chart-title">Zonificación de Metraje</p>
                  <DonutChart data={distributionData} colors={COLORS} />
                </div>
              </div>
            )}

            {activeTab === 'bookings' && (
              <div className="section">
                <div style={{textAlign:'center', maxWidth:640, margin:'0 auto 48px'}}>
                  <h2 style={{fontSize:'1.875rem', fontWeight:800, marginBottom:12}}>Estrategias de Precio y Reservas</h2>
                  <p style={{color:'#64748b', fontStyle:'italic'}}>"No vendemos noches, vendemos experiencias que justifican un precio premium".</p>
                </div>
                <div className="grid-2">
                  {[
                    { icon: '🛰️', title: 'Infraestructura Nómada', desc: 'Instalación de Starlink y estaciones de trabajo. Esto nos permite capturar reservas de 14-30 días durante los meses bajos, manteniendo el ROI estable.' },
                    { icon: '🧘', title: 'Wellness Corner (Spa)', desc: 'El rancho no es solo un área social; es un centro de bienestar. Deck de yoga y ducha exterior tipo balinés. Este "look & feel" aumenta el valor percibido un 20% en Airbnb.' },
                    { icon: '🚜', title: 'Alianza con "Cuadras"', desc: 'Estamos a 100m de un negocio de tours. Crearemos paquetes "Stay & Adventure". Cobramos comisión por referido e incluimos el tour en el "título" de nuestro anuncio.' },
                    { icon: '☀️', title: 'Eficiencia Energética (Solar)', desc: 'Paneles solares. El A/C es el mayor gasto en Guanacaste. Eliminar este costo variable protege el ROI neto del inversor ante alzas de tarifas eléctricas.' },
                  ].map((item, i) => (
                    <div key={i} className="feature-card">
                      <div className="feature-icon">{item.icon}</div>
                      <h3>{item.title}</h3>
                      <p>{item.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {activeTab === 'comercial' && (
              <div className="section">
                <div className="comercial-box">
                  <div className="comercial-left">
                    <h2 style={{fontSize:'1.875rem', fontWeight:800, marginBottom:24}}>Locales Comerciales: El Anclaje</h2>
                    <p style={{opacity:0.8, marginBottom:32, fontSize:'1.05rem', lineHeight:1.7}}>
                      El frente de la propiedad tiene un potencial de renta comercial de aprox. <strong>$18-22 por m²</strong>. Esto genera un flujo de caja fijo que no depende del turismo.
                    </p>
                    {[
                      { label: 'Opción A: Cafetería/Bakery', note: 'Sinergia total: los huéspedes de Airbnb bajan a desayunar.' },
                      { label: 'Opción B: Farmacia / Mini-Market', note: 'Servicios esenciales muy escasos en el punto exacto de Huacas.' },
                      { label: 'Opción C: Consultorio / Oficina', note: 'Cero ruido, ingresos fijos a largo plazo (contratos de 3 años).' },
                    ].map((o, i) => (
                      <div key={i} className="opt-card">
                        <span>{o.label}</span>
                        <p>{o.note}</p>
                      </div>
                    ))}
                  </div>
                  <div className="comercial-right">
                    <div className="security-box">
                      <h4>Impacto de Seguridad Financiera</h4>
                      <ul>
                        <li>✅ Cubre el 100% de costos de mantenimiento del complejo.</li>
                        <li>✅ Elimina el riesgo de "meses en rojo" por baja ocupación.</li>
                        <li>✅ Aumenta el valor de tasación bancaria (Uso Mixto).</li>
                      </ul>
                      <div className="income-block">
                        <p>Ingreso Mensual Estimado (2 locales)</p>
                        <div className="amount">₡650,000 – ₡800,000</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'financiero' && (
              <div className="section">
                <div className="chart-box">
                  <h3 style={{fontSize:'1.5rem', fontWeight:800, textAlign:'center', marginBottom:32}}>Comparativa: Tradicional vs. Uso Mixto Optimizado</h3>
                  <BarChartSVG data={dataComparativa} />
                </div>
                <div className="stat-grid">
                  <div className="stat-card stat-dark">
                    <p>Inversión Adicional Locales</p>
                    <div className="val">₡18.5M</div>
                    <div className="note">*Estimado construcción ligera</div>
                  </div>
                  <div className="stat-card stat-teal">
                    <p>Ingreso Proyectado Total</p>
                    <div className="val">₡34.5M / año</div>
                    <div className="note">*Combinado fijo + variable</div>
                  </div>
                  <div className="stat-card stat-amber">
                    <p>Recuperación de Inversión</p>
                    <div className="val">~7.2 Años</div>
                    <div className="note">*2.8 años antes que el original</div>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer>
            <div className="footer-grid">
              <div>
                <h5>Fuentes de Mercado:</h5>
                <ul>
                  <li>• AirDNA - Market Data Santa Cruz / Tamarindo (2024).</li>
                  <li>• Airbnb Host Standards (Professional Fees 15%).</li>
                  <li>• Cotización Constructora Meraki (Estructura Base).</li>
                  <li>• Benchmarking Local Comercial Huacas / Villareal ($20/m²).</li>
                </ul>
              </div>
              <div className="footer-right">
                Este modelo asume un manejo profesional de las unidades y una estrategia de marketing digital activa.
                <strong>PROYECTO HUACAS — GUANACASTE</strong>
              </div>
            </div>
          </footer>

          <div className="back-btn-wrap">
            <a href="index.html">← Volver al Análisis</a>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
